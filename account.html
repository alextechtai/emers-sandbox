<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Emers Sandbox &middot; Account</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#14161a; --ink-soft:#3a3f47; --muted:#6b7280;
    --paper:#eef0f3; --surface:#ffffff; --line:#e2e4e8; --line-strong:#cfd3da;
    --accent:#1f4dff; --accent-ink:#0f2fb0; --price:#e0442b;
    --ok:#127a3e; --ok-bg:#e6f4ec; --warn:#8a6d1a; --warn-bg:#fbf3d9;
    --off:#9aa0aa; --off-bg:#f1f2f5;
    --shadow:0 1px 2px rgba(20,22,26,.05),0 8px 24px rgba(20,22,26,.06);
    --radius:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:"Inter",system-ui,sans-serif;font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  .mono{font-family:"IBM Plex Mono",monospace}

  .cmd{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:22px;padding:12px 26px;background:rgba(20,22,26,.96);color:#f4f5f7}
  .wordmark{display:flex;align-items:center;gap:11px;font-family:"Archivo";font-weight:800;letter-spacing:.14em;font-size:14px;text-transform:uppercase}
  .wordmark .dot{width:11px;height:11px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px rgba(31,77,255,.22)}
  .wordmark small{font-weight:500;letter-spacing:.18em;color:#8b90a0;font-size:11px}
  .cmd-right{margin-left:auto;display:flex;align-items:center;gap:16px}
  .cmd a.back{font-size:12.5px;color:#c3c7d2;text-decoration:none;border:1px solid #3a3f47;border-radius:8px;padding:7px 12px}
  .cmd a.back:hover{color:#fff}
  .signout{background:transparent;border:1px solid #3a3f47;color:#c3c7d2;border-radius:8px;padding:7px 12px;font-size:12.5px;cursor:pointer;font-family:"Inter"}
  .signout:hover{color:#fff}

  .wrap{max-width:1080px;margin:0 auto;padding:28px 26px 80px}
  .page-title{font-family:"Archivo";font-weight:800;font-size:20px;margin:0 0 4px}
  .page-sub{color:var(--muted);font-size:13.5px;margin:0 0 24px}

  .tabs{display:flex;gap:6px;margin-bottom:22px;border-bottom:1px solid var(--line)}
  .tabs button{background:transparent;border:none;padding:11px 4px;margin-right:22px;font-family:"Archivo";font-weight:700;font-size:13px;letter-spacing:.03em;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent}
  .tabs button.active{color:var(--ink);border-bottom-color:var(--accent)}
  .pane{display:none}
  .pane.active{display:block}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px;margin-bottom:14px}
  .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;flex-wrap:wrap}
  .card-co{font-family:"Archivo";font-weight:800;font-size:16px}
  .card-meta{color:var(--muted);font-size:13px;margin-top:3px;line-height:1.5}
  .badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.03em}
  .badge.pending{background:var(--warn-bg);color:var(--warn)}
  .badge.approved{background:var(--ok-bg);color:var(--ok)}
  .badge.rejected{background:var(--off-bg);color:var(--off)}

  .section-label{font-family:"Archivo";font-weight:700;font-size:11.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin:16px 0 8px}
  .mkt-grid{display:flex;flex-wrap:wrap;gap:10px}
  .mkt-chk{display:flex;align-items:center;gap:7px;border:1px solid var(--line-strong);border-radius:9px;padding:7px 11px;font-size:13px;cursor:pointer}
  .mkt-chk input{margin:0}
  .mkt-chk .cur{width:64px;padding:4px 6px;border:1px solid var(--line-strong);border-radius:6px;font-size:12px;margin-left:6px}
  .brand-grid{display:flex;flex-wrap:wrap;gap:10px}
  .brand-row{display:flex;align-items:center;gap:8px;border:1px solid var(--line-strong);border-radius:9px;padding:7px 11px;font-size:13px}
  .brand-row input{width:60px;padding:4px 6px;border:1px solid var(--line-strong);border-radius:6px;font-size:12px;text-align:right}
  .row-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
  .btn{border:none;border-radius:9px;padding:9px 16px;font-family:"Archivo";font-weight:700;font-size:12.5px;letter-spacing:.02em;text-transform:uppercase;cursor:pointer}
  .btn.primary{background:var(--accent);color:#fff}
  .btn.primary:hover{background:var(--accent-ink)}
  .btn.ghost{background:transparent;border:1px solid var(--line-strong);color:var(--ink-soft)}
  .btn.danger{background:transparent;border:1px solid #e2b3ac;color:#b3271c}
  .save-msg{font-size:12.5px;color:var(--muted);margin-top:8px}
  .empty{color:var(--muted);font-size:13.5px;padding:30px 0;text-align:center}

  .kv{display:grid;grid-template-columns:140px 1fr;gap:8px 14px;font-size:14px;margin-bottom:6px}
  .kv b{font-weight:600;color:var(--ink-soft)}
  .soon{color:var(--muted);font-size:13.5px;margin-top:18px;padding-top:14px;border-top:1px solid var(--line)}
</style>
</head>
<body>

<div id="appRoot" style="display:none">
<header class="cmd">
  <div class="wordmark"><span class="dot"></span>EMERS <small id="wmLabel">ACCOUNT</small></div>
  <div class="cmd-right">
    <a class="back" href="index.html">&larr; Catalog</a>
    <button class="signout" onclick="doSignOut()">Sign out</button>
  </div>
</header>

<div class="wrap" id="wrap">
  <div class="state" style="color:var(--muted);font-size:13.5px">Loading account...</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const CONFIG = {
  SUPABASE_URL: "https://qrawstayhwvdebtgvbru.supabase.co",
  SUPABASE_KEY: "sb_publishable_1UXE6XICF9FaMgPvDjslqQ_AWM_kbuU"
};

let sb=null, sbSession=null, myProfile=null;
let MARKETS=[], BRANDS=[], CUSTOMERS=[], MARKET_ACCESS=[], BRAND_DISCOUNTS=[], LAST_LOGIN={};
let ORDERS=[], ORDER_ITEMS=[];

document.addEventListener("DOMContentLoaded", boot);

async function boot(){
  sb = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
  const {data:{session}} = await sb.auth.getSession();
  sbSession=session;
  if(!session){ window.location.href="index.html"; return; }

  const {data:profile}=await sb.from("profiles").select("*").eq("id",session.user.id).maybeSingle();
  if(!profile){ window.location.href="index.html"; return; }
  myProfile=profile;

  document.getElementById("appRoot").style.display="block";

  if(profile.role==="staff"){
    document.getElementById("wmLabel").textContent="ADMIN";
    await loadAdminData();
    renderAdmin();
  } else {
    document.getElementById("wmLabel").textContent="ACCOUNT";
    await renderCustomerSettings(profile);
  }
}

async function doSignOut(){
  await sb.auth.signOut();
  window.location.href="index.html";
}

/* ================= customer view ================= */
async function renderCustomerSettings(profile){
  const wrap=document.getElementById("wrap");
  const {data:cust}=await sb.from("customers").select("*").eq("id",profile.customer_id).maybeSingle();
  if(!cust){ wrap.innerHTML='<div class="empty">No account found.</div>'; return; }

  const [{data:markets},{data:discounts},{data:allMarkets},{data:allBrands}]=await Promise.all([
    sb.from("customer_market_access").select("*").eq("customer_id",cust.id),
    sb.from("customer_brand_discounts").select("*").eq("customer_id",cust.id),
    sb.from("markets").select("*"),
    sb.from("brands").select("*")
  ]);

  const marketNames=(markets||[]).map(a=>{
    const m=(allMarkets||[]).find(x=>x.id===a.market_id);
    return m ? `${m.name} (${a.currency})` : a.market_id;
  }).join(", ") || "None assigned yet";

  const discountRows=(discounts||[]).map(d=>{
    const b=(allBrands||[]).find(x=>x.id===d.brand_id);
    return `<div class="kv"><b>${escapeHtml(b?b.name:"Brand")}</b><span>${d.discount_percent}% off SRP</span></div>`;
  }).join("") || '<div class="card-meta">No brand discounts assigned yet.</div>';

  wrap.innerHTML=`
    <h1 class="page-title">Account settings</h1>
    <p class="page-sub">Your wholesale account details. Contact Emers to change anything here.</p>
    <div class="card">
      <div class="card-top">
        <div>
          <div class="card-co">${escapeHtml(cust.company||"")}</div>
          <div class="card-meta">${escapeHtml(cust.name||"")} &middot; ${escapeHtml(cust.contact_email||"")} &middot; ${escapeHtml(cust.phone||"")}</div>
        </div>
        <span class="badge ${cust.status}">${cust.status}</span>
      </div>
      <div class="section-label">Markets</div>
      <div class="card-meta">${escapeHtml(marketNames)}</div>
      <div class="section-label">Brand discounts</div>
      ${discountRows}
      <div class="soon">Order history, saved addresses, and password changes will live here in a later update.</div>
    </div>
  `;
}

/* ================= staff / admin view ================= */
async function loadAdminData(){
  const [m,b,c,ma,bd,pr,log,ord,oi]=await Promise.all([
    sb.from("markets").select("*"),
    sb.from("brands").select("*"),
    sb.from("customers").select("*").order("created_at",{ascending:false}),
    sb.from("customer_market_access").select("*"),
    sb.from("customer_brand_discounts").select("*"),
    sb.from("profiles").select("id,customer_id"),
    sb.from("login_access_log").select("profile_id,occurred_at").order("occurred_at",{ascending:false}),
    sb.from("orders").select("*").order("submitted_at",{ascending:false}),
    sb.from("order_items").select("*")
  ]);
  MARKETS=m.data||[]; BRANDS=b.data||[]; CUSTOMERS=c.data||[];
  MARKET_ACCESS=ma.data||[]; BRAND_DISCOUNTS=bd.data||[];
  ORDERS=ord.data||[]; ORDER_ITEMS=oi.data||[];

  const profileToCustomer={};
  (pr.data||[]).forEach(p=>{ if(p.customer_id) profileToCustomer[p.id]=p.customer_id; });
  LAST_LOGIN={};
  (log.data||[]).forEach(row=>{
    const custId=profileToCustomer[row.profile_id];
    if(custId && !LAST_LOGIN[custId]) LAST_LOGIN[custId]=row.occurred_at; // first hit is most recent, log is sorted desc
  });
}

function renderAdmin(){
  const wrap=document.getElementById("wrap");
  wrap.innerHTML=`
    <h1 class="page-title">Admin</h1>
    <p class="page-sub">Review applications and manage market access and brand discounts per account.</p>
    <div class="tabs">
      <button class="active" id="tabPending" onclick="switchTab('pending')">Pending applications</button>
      <button id="tabAccounts" onclick="switchTab('accounts')">Accounts</button>
      <button id="tabOrders" onclick="switchTab('orders')">Orders</button>
    </div>
    <div id="panePending" class="pane active"></div>
    <div id="paneAccounts" class="pane"></div>
    <div id="paneOrders" class="pane"></div>
  `;
  renderPending(); renderAccounts(); renderOrders();
}

function switchTab(which){
  document.getElementById("tabPending").classList.toggle("active",which==="pending");
  document.getElementById("tabAccounts").classList.toggle("active",which==="accounts");
  document.getElementById("tabOrders").classList.toggle("active",which==="orders");
  document.getElementById("panePending").classList.toggle("active",which==="pending");
  document.getElementById("paneAccounts").classList.toggle("active",which==="accounts");
  document.getElementById("paneOrders").classList.toggle("active",which==="orders");
}

function marketAccessFor(custId){ return MARKET_ACCESS.filter(a=>a.customer_id===custId); }
function brandDiscountsFor(custId){ return BRAND_DISCOUNTS.filter(d=>d.customer_id===custId); }

function accountCardHtml(cust, statusLabel){
  const access=marketAccessFor(cust.id);
  const discounts=brandDiscountsFor(cust.id);
  const marketRow=MARKETS.map(m=>{
    const existing=access.find(a=>a.market_id===m.id);
    return `<label class="mkt-chk">
      <input type="checkbox" data-mkt="${m.id}" ${existing?"checked":""}/>
      ${m.name}
      <input type="text" class="cur" data-cur="${m.id}" value="${existing?existing.currency:m.currency}" title="Billing currency"/>
    </label>`;
  }).join("");
  const brandRow=BRANDS.map(b=>{
    const existing=discounts.find(d=>d.brand_id===b.id);
    return `<div class="brand-row">${b.name}
      <input type="number" min="0" max="100" step="1" data-brand="${b.id}" value="${existing?existing.discount_percent:0}"/> %
    </div>`;
  }).join("");

  const lastLogin=LAST_LOGIN[cust.id];
  const lastLoginText=lastLogin ? new Date(lastLogin).toLocaleString() : "Never signed in";

  return `<div class="card" data-cust="${cust.id}">
    <div class="card-top">
      <div>
        <div class="card-co">${escapeHtml(cust.company||"")}</div>
        <div class="card-meta">${escapeHtml(cust.name||"")} &middot; ${escapeHtml(cust.contact_email||"")} &middot; ${escapeHtml(cust.phone||"")}</div>
        <div class="card-meta">Last sign-in: ${escapeHtml(lastLoginText)}</div>
      </div>
      <span class="badge ${cust.status}">${statusLabel}</span>
    </div>
    <div class="section-label">Market access and billing currency</div>
    <div class="mkt-grid">${marketRow}</div>
    <div class="section-label">Discount per brand</div>
    <div class="brand-grid">${brandRow||'<span class="card-meta">No brands loaded yet.</span>'}</div>
    <div class="row-actions">
      ${cust.status==="pending"?`<button class="btn primary" onclick="approveCustomer('${cust.id}')">Approve</button>
      <button class="btn danger" onclick="rejectCustomer('${cust.id}')">Reject</button>`:""}
      <button class="btn ghost" onclick="saveCustomer('${cust.id}')">Save permissions</button>
    </div>
    <div class="save-msg" id="msg-${cust.id}"></div>
  </div>`;
}

function renderPending(){
  const pending=CUSTOMERS.filter(c=>c.status==="pending");
  document.getElementById("panePending").innerHTML = pending.length
    ? pending.map(c=>accountCardHtml(c,"Pending")).join("")
    : '<div class="empty">No pending applications.</div>';
}

function renderAccounts(){
  const rest=CUSTOMERS.filter(c=>c.status!=="pending");
  document.getElementById("paneAccounts").innerHTML = rest.length
    ? rest.map(c=>accountCardHtml(c, c.status==="approved"?"Approved":"Rejected")).join("")
    : '<div class="empty">No approved or rejected accounts yet.</div>';
}

async function saveCustomer(custId){
  const card=document.querySelector(`.card[data-cust="${custId}"]`);
  const msg=document.getElementById("msg-"+custId);
  msg.textContent="Saving...";

  const marketWrites=[];
  card.querySelectorAll(".mkt-chk").forEach(row=>{
    const chk=row.querySelector("input[type=checkbox]");
    const cur=row.querySelector("input.cur");
    if(chk.checked) marketWrites.push({customer_id:custId, market_id:chk.dataset.mkt, currency:cur.value.trim()||"USD"});
  });
  const brandWrites=[];
  card.querySelectorAll(".brand-row input").forEach(inp=>{
    const pct=Number(inp.value||0);
    if(pct>0) brandWrites.push({customer_id:custId, brand_id:inp.dataset.brand, discount_percent:pct});
  });

  const {error:delMktErr}=await sb.from("customer_market_access").delete().eq("customer_id",custId);
  const {error:delBrandErr}=await sb.from("customer_brand_discounts").delete().eq("customer_id",custId);
  let insErr=null;
  if(marketWrites.length){ const r=await sb.from("customer_market_access").insert(marketWrites); insErr=insErr||r.error; }
  if(brandWrites.length){ const r=await sb.from("customer_brand_discounts").insert(brandWrites); insErr=insErr||r.error; }

  const err=delMktErr||delBrandErr||insErr;
  if(err){ msg.textContent="Error: "+err.message; msg.style.color="#b3271c"; return; }
  msg.textContent="Saved."; msg.style.color="var(--ok)";
  await loadAdminData();
  renderPending(); renderAccounts();
}

async function approveCustomer(custId){
  await saveCustomer(custId);
  const {error}=await sb.from("customers").update({status:"approved", approved_at:new Date().toISOString()}).eq("id",custId);
  if(error){ alert(error.message); return; }
  await loadAdminData();
  renderPending(); renderAccounts();
  switchTab("accounts");
}

async function rejectCustomer(custId){
  const {error}=await sb.from("customers").update({status:"rejected"}).eq("id",custId);
  if(error){ alert(error.message); return; }
  await loadAdminData();
  renderPending(); renderAccounts();
}

function renderOrders(){
  const pending=ORDERS.filter(o=>o.status==="pending");
  const rest=ORDERS.filter(o=>o.status!=="pending");
  const el=document.getElementById("paneOrders");
  const section=(title,list)=> `<div class="section-label">${title}</div>` + (list.length ? list.map(orderCardHtml).join("") : '<div class="empty">None yet.</div>');
  el.innerHTML = section("Pending review",pending) + section("Reviewed",rest);
}

function orderCardHtml(o){
  const cust=CUSTOMERS.find(c=>c.id===o.customer_id);
  const mkt=MARKETS.find(m=>m.id===o.market_id);
  const items=ORDER_ITEMS.filter(i=>i.order_id===o.id);
  const rows=items.map(i=>`<div class="mkt-chk" style="cursor:default"><span class="mono">${escapeHtml(i.style_number||"")}</span>&nbsp;${escapeHtml(i.color||"")} / ${escapeHtml(i.size||"")} &middot; qty ${i.quantity} &middot; net ${i.unit_net!=null?Number(i.unit_net).toFixed(2):"\u2014"}</div>`).join("");
  const statusLabel=o.status==="pending"?"Pending":(o.status==="approved"?"Approved":"Rejected");
  return `<div class="card" data-order="${o.id}">
    <div class="card-top">
      <div>
        <div class="card-co">${escapeHtml(cust?cust.company:"Unknown account")}</div>
        <div class="card-meta">${mkt?mkt.name:""} &middot; ${o.currency} ${Number(o.total_net||0).toLocaleString()} &middot; submitted ${new Date(o.submitted_at).toLocaleString()}</div>
      </div>
      <span class="badge ${o.status}">${statusLabel}</span>
    </div>
    <div class="section-label">Items</div>
    <div class="mkt-grid">${rows||'<span class="card-meta">No line items found.</span>'}</div>
    ${o.status==="pending"?`<div class="row-actions">
      <button class="btn primary" onclick="approveOrder('${o.id}')">Approve</button>
      <button class="btn danger" onclick="rejectOrder('${o.id}')">Reject</button>
    </div>`:""}
    <div class="save-msg" id="omsg-${o.id}"></div>
  </div>`;
}

async function approveOrder(orderId){
  const msg=document.getElementById("omsg-"+orderId);
  const o=ORDERS.find(x=>x.id===orderId);
  const items=ORDER_ITEMS.filter(i=>i.order_id===orderId);
  if(msg) msg.textContent="Approving...";

  for(const i of items){
    const {error}=await sb.rpc("fulfill_inventory",{p_sku_id:i.sku_id,p_market_id:o.market_id,p_qty:i.quantity});
    if(error){ if(msg){ msg.textContent="Error: "+error.message; msg.style.color="#b3271c"; } return; }
  }
  const {error:updErr}=await sb.from("orders").update({status:"approved", reviewed_at:new Date().toISOString(), reviewed_by:sbSession.user.id}).eq("id",orderId);
  if(updErr){ if(msg){ msg.textContent="Error: "+updErr.message; msg.style.color="#b3271c"; } return; }

  await loadAdminData();
  renderOrders();
}

async function rejectOrder(orderId){
  const msg=document.getElementById("omsg-"+orderId);
  const o=ORDERS.find(x=>x.id===orderId);
  const items=ORDER_ITEMS.filter(i=>i.order_id===orderId);
  if(msg) msg.textContent="Rejecting...";

  for(const i of items){
    const {error}=await sb.rpc("release_inventory",{p_sku_id:i.sku_id,p_market_id:o.market_id,p_qty:i.quantity});
    if(error){ if(msg){ msg.textContent="Error: "+error.message; msg.style.color="#b3271c"; } return; }
  }
  const {error:updErr}=await sb.from("orders").update({status:"rejected", reviewed_at:new Date().toISOString(), reviewed_by:sbSession.user.id}).eq("id",orderId);
  if(updErr){ if(msg){ msg.textContent="Error: "+updErr.message; msg.style.color="#b3271c"; } return; }

  await loadAdminData();
  renderOrders();
}

function escapeHtml(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
</script>
</body>
</html>
